name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ""
        required: false
      go-version:
        description: "Go version to use if building needs to be done"
        default: "1.26.3"
        required: false
      cleanup-disk:
        description: Whether or not perform a disk cleanup in the runner
        default: true
        type: boolean
        required: false

jobs:
  publish-provider-package:
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider.yml@main
    with:
      cleanup-disk: ${{ inputs.cleanup-disk }}
      go-version: ${{ github.event.inputs.go-version }}
      repository: provider-kafka
      version: ${{ github.event.inputs.version }}
    secrets:
      GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
      XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_ACCESS_ID }}
      XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_TOKEN }}

  add-extensions:
    needs: publish-provider-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Append extensions
        run: make xpkg.append VERSION=${{ inputs.version }}
    env:
      GO_REQUIRED_VERSION: ${{ inputs.go-version }}
      XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_ACCESS_ID }}
      XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_TOKEN }}
