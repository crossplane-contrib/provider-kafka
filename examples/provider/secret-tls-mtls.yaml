apiVersion: v1
kind: Secret
metadata:
  name: kafka-creds
  namespace: kafka-cluster
type: Opaque
stringData:
  credentials: |
    {
      "brokers": [
        "kafka-0.kafka-headless:9093",
        "kafka-1.kafka-headless:9093",
        "kafka-2.kafka-headless:9093"
      ],
      "sasl": {
        "mechanism": "PLAIN",
        "username": "user1",
        "password": "password123"
      },
      "tls": {
        "insecureSkipVerify": false,
        "clientCertificateSecretRef": {
          "name": "kafka-client-certs",
          "namespace": "kafka-cluster"
        }
      }
    }
---
# Client certificate secret (e.g. managed by cert-manager)
# Default fields: tls.crt and tls.key
# Override with "certField" and "keyField" in clientCertificateSecretRef
apiVersion: v1
kind: Secret
metadata:
  name: kafka-client-certs
  namespace: kafka-cluster
type: kubernetes.io/tls
data:
  tls.crt: <base64-encoded-certificate>
  tls.key: <base64-encoded-private-key>
